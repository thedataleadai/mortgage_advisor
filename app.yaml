command: ["uv", "run", "start-app"]
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  
  # Vector Search Configuration
  - name: VECTOR_SEARCH_ENDPOINT
    value: "mortgage_vector_search_endpoint"
  - name: COMPLIANCE_INDEX_NAME
    value: "mortgage.compliance.compliance_rules_vs_index"
  - name: PRODUCTS_INDEX_NAME
    value: "mortgage.products.lender_products_vs_index"
  - name: CATALOG_NAME
    value: "mortgage"
